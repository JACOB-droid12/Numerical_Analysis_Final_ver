          - generic [ref=e182]:
            - paragraph [ref=e183]: Horner is more accurate in stepwise arithmetic for this input because its absolute error is smaller than direct evaluation.
            - paragraph [ref=e184]: Horner uses fewer arithmetic operations here (18 versus 55), which is why it is usually preferred for polynomial evaluation.
            - paragraph [ref=e185]: Final-only rounding is identical for both methods because rounding is deferred until after the exact polynomial value is computed. The gap between final-only and stepwise errors shows that most of the visible loss comes from intermediate rounding, not from the last decimal representation alone. Direct evaluation amplifies round-off more strongly for this polynomial at the chosen x.
