        - generic [ref=e318]:
          - heading "Interpretation" [level=3] [ref=e319]
          - paragraph [ref=e320]: Absolute error tells you the raw distance between the true value and the approximation, measured in the same units as p.
          - paragraph [ref=e321]: Relative error is usually the better accuracy measure here because it scales the error by the size of the true value. This approximation is off by about 15409999999999999999999999999999999999999999999999999900%.
          - paragraph [ref=e322]: t = 0 because the relative error satisfies the threshold 5 x 10^-0 but not the tighter threshold 5 x 10^-1.
          - paragraph [ref=e323]: The maximum absolute error bound combines the scale of p with the significant-digit threshold, so it grows when the true value is larger.