        - generic [ref=e201]:
          - heading "Stability Conclusion" [level=3] [ref=e202]
          - paragraph [ref=e203]: Horner is more accurate in stepwise arithmetic for this input because its absolute error is smaller than direct evaluation.
          - paragraph [ref=e204]: Horner uses fewer arithmetic operations here (6 versus 7), which is why it is usually preferred for polynomial evaluation.
          - paragraph [ref=e205]: Final-only rounding is identical for both methods because rounding is deferred until after the exact polynomial value is computed. The gap between final-only and stepwise errors shows that most of the visible loss comes from intermediate rounding, not from the last decimal representation alone. Direct evaluation amplifies round-off more strongly for this polynomial at the chosen x.
