<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Machine Arithmetic and Error Analysis Lab">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafaf7"/>
      <stop offset="1" stop-color="#f3f3ef"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f6f5f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1a1a1a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="72" height="630" fill="#3568c2"/>
  <rect x="72" y="0" width="9" height="630" fill="#2a519b" opacity="0.3"/>

  <text x="118" y="92" fill="#2a519b" font-family="Source Sans 3, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="2.5">NUMERICAL ANALYSIS TOOLKIT</text>
  <text x="118" y="184" fill="#1a1a1a" font-family="Source Serif 4, Georgia, serif" font-size="62" font-weight="700">
    <tspan x="118" dy="0">Machine Arithmetic</tspan>
    <tspan x="118" dy="72">and Error Analysis Lab</tspan>
  </text>
  <text x="118" y="332" fill="#4d4d56" font-family="Source Sans 3, Arial, sans-serif" font-size="30" font-weight="500">
    Floating-point storage, rounding rules, polynomial comparison, and root finding.
  </text>

  <g transform="translate(118 392)">
    <rect x="0" y="0" rx="14" ry="14" width="102" height="48" fill="#3a6cba"/>
    <rect x="114" y="0" rx="14" ry="14" width="98" height="48" fill="#934aac"/>
    <rect x="226" y="0" rx="14" ry="14" width="92" height="48" fill="#2e8a9c"/>
    <rect x="332" y="0" rx="14" ry="14" width="86" height="48" fill="#2f8b6a"/>
    <rect x="432" y="0" rx="14" ry="14" width="92" height="48" fill="#b27520"/>
    <rect x="538" y="0" rx="14" ry="14" width="82" height="48" fill="#6e6e76"/>
    <text x="26" y="31" fill="#ffffff" font-family="Source Sans 3, Arial, sans-serif" font-size="18" font-weight="700">Module I</text>
    <text x="138" y="31" fill="#ffffff" font-family="Source Sans 3, Arial, sans-serif" font-size="18" font-weight="700">Module II</text>
    <text x="250" y="31" fill="#ffffff" font-family="Source Sans 3, Arial, sans-serif" font-size="18" font-weight="700">Module III</text>
    <text x="352" y="31" fill="#ffffff" font-family="Source Sans 3, Arial, sans-serif" font-size="18" font-weight="700">Module IV</text>
    <text x="454" y="31" fill="#ffffff" font-family="Source Sans 3, Arial, sans-serif" font-size="18" font-weight="700">Module V</text>
    <text x="560" y="31" fill="#ffffff" font-family="Source Sans 3, Arial, sans-serif" font-size="18" font-weight="700">Guide</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="758" y="98" width="362" height="434" rx="24" ry="24" fill="url(#panel)" stroke="#e0dfd7"/>
  </g>

  <text x="796" y="150" fill="#2a519b" font-family="Source Sans 3, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="1.5">RESULT SNAPSHOT</text>

  <g transform="translate(796 180)">
    <rect x="0" y="0" width="286" height="84" rx="18" ry="18" fill="#ffffff" stroke="#e3e1d8"/>
    <text x="22" y="31" fill="#6b6b73" font-family="Source Sans 3, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">EXACT VALUE p</text>
    <text x="22" y="62" fill="#1a1a1a" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="700">0.948854</text>
  </g>

  <g transform="translate(796 282)">
    <rect x="0" y="0" width="286" height="84" rx="18" ry="18" fill="#ffffff" stroke="#e3e1d8"/>
    <text x="22" y="31" fill="#6b6b73" font-family="Source Sans 3, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">STEPWISE p*</text>
    <text x="22" y="62" fill="#1a1a1a" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="700">0.94885</text>
  </g>

  <g transform="translate(796 384)">
    <rect x="0" y="0" width="286" height="112" rx="18" ry="18" fill="#f8f7f2" stroke="#e3e1d8"/>
    <text x="22" y="31" fill="#6b6b73" font-family="Source Sans 3, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">KEY IDEAS</text>
    <text x="22" y="63" fill="#1a1a1a" font-family="Source Sans 3, Arial, sans-serif" font-size="20" font-weight="600">chop, round, compare, trace</text>
    <text x="22" y="92" fill="#4d4d56" font-family="Source Sans 3, Arial, sans-serif" font-size="17" font-weight="500">IEEE-754, errors, polynomials, roots</text>
  </g>

  <text x="118" y="508" fill="#6b6b73" font-family="Source Sans 3, Arial, sans-serif" font-size="21" font-weight="600">Machine Arithmetic and Error Analysis Lab</text>
  <text x="118" y="546" fill="#4d4d56" font-family="Source Sans 3, Arial, sans-serif" font-size="18" font-weight="500">Exact values, machine values, and the path between them.</text>
</svg>
